<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Live from GitHub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #6b7280;
        }
        .error-message {
            text-align: center;
            padding: 2rem;
            background: #fee;
            color: #c00;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Adam Powley</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About & Resume</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <h1>My GitHub Projects</h1>
        <p class="section-subtitle">These projects are automatically fetched from my GitHub profile. ⭐ starred repos appear first!</p>

        <div id="projects-container">
            <div class="loading">📡 Fetching repositories from GitHub...</div>
        </div>
    </main>

    <footer>
        <p>© 2026 Adam Powley | Built with HTML/CSS on GitHub Pages</p>
    </footer>

    <script>
        const GITHUB_USERNAME = 'Adam-Powley'; // Replace with your GitHub username
        
        async function fetchGitHubProjects() {
            const container = document.getElementById('projects-container');
            
            try {
                // Fetch user's repositories
                const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=12`);
                
                if (!response.ok) throw new Error('Failed to fetch repos');
                
                const repos = await response.json();
                
                if (repos.length === 0) {
                    container.innerHTML = '<div class="error-message">No public repositories found. Make sure your GitHub profile has public repos!</div>';
                    return;
                }
                
                // Filter out the portfolio repo if you want
                const filteredRepos = repos.filter(repo => repo.name !== 'Adam-Powley.github.io');
                
                // Build HTML
                let projectsHTML = '<div class="projects-grid">';
                
                for (const repo of filteredRepos) {
                    // Fetch README for better description (optional)
                    let description = repo.description || 'No description provided. Check the repo for details!';
                    
                    // Truncate long descriptions
                    if (description.length > 150) {
                        description = description.substring(0, 147) + '...';
                    }
                    
                    projectsHTML += `
                        <div class="project-card">
                            <div class="project-header">
                                <h3>${escapeHtml(repo.name.replace(/-/g, ' '))}</h3>
                                ${repo.stargazers_count > 0 ? `<span class="star-count">⭐ ${repo.stargazers_count}</span>` : ''}
                            </div>
                            
                            <p class="project-description">${escapeHtml(description)}</p>
                            
                            <div class="repo-stats">
                                <span>📅 Updated: ${new Date(repo.updated_at).toLocaleDateString()}</span>
                                ${repo.language ? `<span>💻 ${repo.language}</span>` : ''}
                                ${repo.forks_count > 0 ? `<span>🍴 ${repo.forks_count}</span>` : ''}
                            </div>
                            
                            <div class="project-links">
                                <a href="${repo.html_url}" class="project-link" target="_blank">📁 View on GitHub</a>
                                ${repo.homepage ? `<a href="${repo.homepage}" class="project-link" target="_blank">🔗 Live Demo</a>` : ''}
                            </div>
                        </div>
                    `;
                }
                
                projectsHTML += '</div>';
                
                // Add GitHub stats
                projectsHTML += `
                    <div class="github-stats">
                        <h3>📊 GitHub Activity</h3>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number">${filteredRepos.length}</div>
                                <div class="stat-label">Public Repos</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${filteredRepos.reduce((sum, repo) => sum + repo.stargazers_count, 0)}</div>
                                <div class="stat-label">Total Stars</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${filteredRepos.reduce((sum, repo) => sum + repo.forks_count, 0)}</div>
                                <div class="stat-label">Total Forks</div>
                            </div>
                        </div>
                        <a href="https://github.com/${GITHUB_USERNAME}" class="github-profile-link" target="_blank">
                            🐙 Visit my GitHub profile →
                        </a>
                    </div>
                `;
                
                container.innerHTML = projectsHTML;
                
            } catch (error) {
                console.error('Error fetching repos:', error);
                container.innerHTML = `
                    <div class="error-message">
                        ⚠️ Unable to load repositories. Please check back later or visit my <a href="https://github.com/${GITHUB_USERNAME}">GitHub profile directly</a>.
                    </div>
                `;
            }
        }
        
        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load projects when page loads
        fetchGitHubProjects();
    </script>
</body>
</html>
